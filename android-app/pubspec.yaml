name: pedidos_app
description: Sistema de gestión de pedidos WhatsApp - Concentrados Monserrath
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  flutter_slidable: ^3.1.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  onesignal_flutter: ^5.2.5
  audioplayers: ^6.1.0
  image_picker: ^1.1.2
  record: ^7.0.0
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#1A3009"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
